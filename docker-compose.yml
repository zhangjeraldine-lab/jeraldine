version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - AI_SERVICE_URL=http://ai-service:8000
      - DATABASE_URL=/data/app.db
      - STEP_API_KEY=${STEP_API_KEY:-}
      - STEP_API_BASE_URL=${STEP_API_BASE_URL:-https://api.stepfun.com/v1}
      - STEP_VISION_MODEL=${STEP_VISION_MODEL:-step-1o-turbo-vision}
      - STEP_IMAGE_EDIT_MODEL=${STEP_IMAGE_EDIT_MODEL:-step-image-edit-2}
      - STEP_IMAGE_STEPS=${STEP_IMAGE_STEPS:-8}
      - STEP_IMAGE_CFG_SCALE=${STEP_IMAGE_CFG_SCALE:-1.0}
    volumes:
      - ./data:/data
    depends_on:
      - ai-service
    networks:
      - co-drawing

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - WORKERS=2
    volumes:
      - ./ai-service/models:/models
      - ./data:/data
    networks:
      - co-drawing
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend-terminal
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001
      - REACT_APP_WS_URL=ws://localhost:3001
    depends_on:
      - backend
    networks:
      - co-drawing

networks:
  co-drawing:
    driver: bridge

volumes:
  data:
    driver: local
